<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor A4 Markdown Pro + Sheets</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <script src="https://unpkg.com/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f1f5f9;
            overflow: hidden;
        }

        header {
            background-color: #ffffff;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .btn {
            background: #e2e8f0;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #475569;
            transition: 0.2s;
        }

        .btn:hover {
            background: #cbd5e1;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 2rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            z-index: 9;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            color: #334155;
            transition: 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn:hover {
            background: #e2e8f0;
        }

        .tool-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f5f9;
        }

        .separator {
            color: #cbd5e1;
            margin: 0 4px;
            font-weight: 300;
        }

        input[type="color"] {
            border: none;
            width: 26px;
            height: 26px;
            cursor: pointer;
            background: transparent;
            padding: 0;
            border-radius: 4px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            border-color: #2563eb;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        select.tool-btn {
            height: 32px;
            padding: 4px 8px;
            outline: none;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #cbd5e1;
            padding: 2px 6px;
            border-radius: 4px;
            background: white;
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #editor-pane {
            width: 50%;
            display: flex;
            flex-direction: column;
            background-color: #1e293b;
            border-right: 1px solid #334155;
            transition: width 0.3s;
        }

        .pane-header {
            background: #0f172a;
            color: #94a3b8;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
        }

        .copy-btn:hover {
            background: #475569;
        }

        #md-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e2e8f0;
            padding: 2rem;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Pílula Base64 Minimalista */
        .b64-pill {
            color: #3b82f6;
            text-decoration: underline;
            cursor: pointer;
            font-family: monospace;
            user-select: none;
            font-weight: 600;
        }

        .b64-pill:hover {
            color: #2563eb;
        }

        #preview-pane {
            flex: 1;
            background-color: #e2e8f0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            gap: 2rem;
            scroll-behavior: smooth;
        }

        /* A4 Page */
        .a4-page {
            width: 794px;
            min-height: 1123px;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            padding: 140px 96px 120px 96px;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            position: absolute;
            top: 40px;
            left: 96px;
            right: 96px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            z-index: 5;
            min-height: 40px;
        }

        /* RODAPÉ EDITÁVEL LEVEMENTE SUBIDO */
        .page-footer {
            position: absolute;
            bottom: 50px;
            left: 96px;
            right: 96px;
            border-top: 2px solid #f1f5f9;
            padding-top: 10px;
            z-index: 5;
            min-height: 30px;
        }

        .header-content,
        .footer-content {
            display: block;
            width: 100%;
            outline: none;
            transition: 0.2s;
            min-height: 24px;
            color: #64748b;
        }

        .header-content:hover,
        .footer-content:hover {
            background: #f8fafc;
            cursor: text;
        }

        .header-content:focus,
        .footer-content:focus {
            color: #334155;
            border-bottom: 1px dashed #cbd5e1;
        }

        .header-content img,
        .footer-content img {
            vertical-align: middle;
            display: inline-block;
            margin-right: 10px;
        }

        /* NÚMERO DA PÁGINA TOTALMENTE INDEPENDENTE LÁ EMBAIXO */
        .page-number-display {
            position: absolute;
            right: 96px;
            bottom: 20px;
            font-size: 11px;
            font-weight: bold;
            color: #94a3b8;
            pointer-events: none;
            user-select: none;
        }

        /* Conteúdo Principal */
        .page-content {
            flex: 1;
            outline: none;
            color: #334155;
            line-height: 1.6;
            display: flow-root;
        }

        .page-content h1,
        .header-content h1,
        .footer-content h1 {
            font-size: 2.2em;
            margin-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .page-content h2,
        .header-content h2,
        .footer-content h2 {
            font-size: 1.6em;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .page-content h3,
        .header-content h3,
        .footer-content h3 {
            font-size: 1.2em;
            margin-top: 1.2rem;
        }

        .page-content p,
        .header-content p,
        .footer-content p {
            margin-bottom: 1rem;
        }

        .page-content blockquote {
            border-left: 4px solid #cbd5e1;
            padding-left: 1rem;
            color: #64748b;
            font-style: italic;
            margin: 1rem 0;
            background: #f8fafc;
            padding: 10px;
        }

        .page-content pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1rem 0;
            font-family: monospace;
        }

        .page-content code {
            background: #e2e8f0;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            color: #ef4444;
        }

        .page-content ul {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
            list-style-type: disc;
        }

        .page-content ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
            list-style-type: decimal;
        }

        .page-content hr:not(.manual-page-break) {
            border: 0;
            border-top: 2px solid #e2e8f0;
            margin: 2rem 0;
        }

        /* Tabelas */
        .page-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.95em;
            table-layout: fixed;
        }

        .page-content th,
        .page-content td {
            border: 1px solid #cbd5e1;
            padding: 10px;
            text-align: left;
            position: relative;
            word-wrap: break-word;
            transition: outline 0.1s;
        }

        .page-content th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: #0f172a;
        }

        .active-cell {
            outline: 2px solid #3b82f6;
            outline-offset: -2px;
            z-index: 5;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            outline: 2px solid transparent;
            transition: outline 0.2s;
            cursor: pointer;
        }

        img:hover {
            outline: 2px dashed #3b82f6;
        }

        img.active-img {
            outline: 3px solid #3b82f6;
        }

        img[align="left"] {
            float: left;
            margin: 0.5rem 1rem 1rem 0;
        }

        img[align="right"] {
            float: right;
            margin: 0.5rem 0 1rem 1rem;
        }

        img:not([align="left"]):not([align="right"]) {
            display: inline-block;
        }

        /* Tooltips Flutuantes */
        .floating-tooltip {
            position: fixed;
            background: #1e293b;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 100;
            transition: opacity 0.2s;
        }

        .floating-tooltip input[type="range"] {
            width: 80px;
            cursor: pointer;
        }

        .float-btn {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .float-btn:hover {
            background: #475569;
        }

        .dark-picker {
            border: 1px solid #475569;
            background: #334155;
            color: white;
        }

        #measure-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 602px;
            visibility: hidden;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* A QUEBRA DE PÁGINA INVISÍVEL, SÓLIDA COMO ROCHA */
        hr.manual-page-break {
            border: none !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            visibility: hidden !important;
            page-break-after: always !important; 
            display: block;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            header, .toolbar, #editor-pane, .floating-tooltip { display: none !important; }
            body, main { background: white !important; overflow: visible !important; height: auto !important; display: block !important; }
            #preview-pane { background: white !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; display: block !important; width: 100% !important; }
            
            .a4-page { 
                margin: 0 !important; 
                box-shadow: none !important; 
                border: none !important; 
                width: 210mm !important; 
                height: 297mm !important; 
                min-height: 297mm !important; 
                page-break-after: always !important; 
                page-break-inside: hidden !important; 
            }
            
            .a4-page:last-child {
                page-break-after: auto !important;
            }

            .active-cell, .active-img { outline: none !important; }
            .header-content:focus, .footer-content:focus { border: none !important; }
            hr.manual-page-break { display: none !important; }
        }
    </style>
</head>

<body>

    <header>
        <h2>📝 Editor A4 Markdown Pro</h2>
        <button class="btn" id="toggle-view">Modo Foco Visual</button>
    </header>

    <div class="toolbar">
        <button class="tool-btn" id="btn-undo" onclick="undo()" title="Desfazer (Ctrl+Z)" disabled>↩️</button>
        <button class="tool-btn" id="btn-redo" onclick="redo()" title="Refazer (Ctrl+Y)" disabled>↪️</button>
        <span class="separator">|</span>
        <select class="tool-btn" onchange="formatText('fontSize', this.value); this.value=''" title="Tamanho da Fonte">
            <option value="">Tamanho</option>
            <option value="1">1 (8pt)</option>
            <option value="2">2 (10pt)</option>
            <option value="3">3 (12pt)</option>
            <option value="4">4 (14pt)</option>
            <option value="5">5 (18pt)</option>
            <option value="6">6 (24pt)</option>
            <option value="7">7 (36pt)</option>
        </select>
        <button class="tool-btn" onclick="formatText('justifyLeft')" title="Alinhar à Esquerda">⇤</button>
        <button class="tool-btn" onclick="formatText('justifyCenter')" title="Centralizar">↔</button>
        <button class="tool-btn" onclick="formatText('justifyRight')" title="Alinhar à Direita">⇥</button>
        <span class="separator">|</span>

        <button class="tool-btn" onclick="formatBlock('H1')" title="Título 1">H1</button>
        <button class="tool-btn" onclick="formatBlock('H2')" title="Título 2">H2</button>
        <button class="tool-btn" onclick="formatBlock('H3')" title="Título 3">H3</button>
        <span class="separator">|</span>
        <button class="tool-btn" onclick="formatText('bold')" title="Negrito"><b>B</b></button>
        <button class="tool-btn" onclick="formatText('italic')" title="Itálico"><i>I</i></button>
        <button class="tool-btn" onclick="formatText('strikeThrough')" title="Riscado"><s>S</s></button>
        <div class="color-picker-wrapper" title="Cor do Texto">
            <input type="color" onchange="formatText('foreColor', this.value)">
        </div>
        <span class="separator">|</span>

        <button class="tool-btn" onclick="formatText('insertUnorderedList')" title="Lista">● Lista</button>
        <button class="tool-btn" onclick="formatText('insertOrderedList')" title="Lista Numerada">1. Lista</button>
        <button class="tool-btn" onclick="insertCustomHTML('<blockquote>Sua citação aqui...</blockquote>')"
            title="Citação">❞ Citação</button>
        <button class="tool-btn" onclick="insertCustomHTML('<pre><code>// Seu código aqui</code></pre>')"
            title="Bloco de Código">&lt;/&gt; Código</button>
        <button class="tool-btn" onclick="formatText('insertHorizontalRule')" title="Linha Separadora">― Linha</button>
        <span class="separator">|</span>
        <button class="tool-btn" onclick="insertPageBreak()" title="Quebra de Página Manual">📄 Quebra</button>
        <span class="separator">|</span>
        <button class="tool-btn" onclick="insertTable()" title="Inserir Tabela"
            style="background: #e0f2fe; border-color: #bae6fd;">📊 Tabela</button>
        <span class="separator">|</span>
        <button class="tool-btn" onclick="insertLink()" title="Inserir Link">🔗 Link</button>
        <button class="tool-btn" onclick="insertImageURL()" title="Inserir Imagem via URL">🌐 Img (URL)</button>
        <button class="tool-btn" onclick="document.getElementById('img-upload').click()"
            title="Fazer Upload de Imagem">📁 Img (PC)</button>
        <input type="file" id="img-upload" hidden accept="image/*" onchange="uploadImage(this)">

        <span style="flex: 1;"></span>
        <button class="tool-btn btn-primary" onclick="window.print()" title="Imprimir / PDF">🖨️ Imprimir</button>
    </div>

    <main>
        <div id="editor-pane">
            <div class="pane-header">
                <span>MARKDOWN SOURCE</span>
                <button class="copy-btn" onclick="copyMarkdown()">📋 Copiar RAW MD</button>
            </div>
            <div id="md-input" contenteditable="true" spellcheck="false"></div>
        </div>

        <div id="preview-pane">
            <div id="a4-pages-container"></div>
        </div>
    </main>

    <div id="img-tooltip" class="floating-tooltip hidden">
        <span>Tamanho:</span>
        <input type="range" id="resizer-slider" min="10" max="100" value="100">
        <span id="resizer-label" style="width: 35px;">100%</span>
        <span style="color: #475569;">|</span>
        <button class="float-btn" onclick="alignImage('left')">[<] Float L</button>
                <button class="float-btn" onclick="alignImage('center')">[=] Inline</button>
                <button class="float-btn" onclick="alignImage('right')">Float R [>]</button>
    </div>

    <div id="table-tooltip" class="floating-tooltip hidden">
        <div class="color-picker-wrapper dark-picker" title="Cor de Fundo da Célula">
            <span>🪣</span>
            <input type="color" id="cell-bg-picker" onchange="styleCell('backgroundColor', this.value)">
        </div>
        <div class="color-picker-wrapper dark-picker" title="Cor do Texto">
            <span>A</span>
            <input type="color" id="cell-text-picker" onchange="styleCell('color', this.value)">
        </div>
        <select class="float-btn" onchange="styleCell('fontSize', this.value)" style="height: 32px; outline: none;">
            <option value="">Tamanho</option>
            <option value="12px">12px</option>
            <option value="14px">14px</option>
            <option value="16px">16px</option>
            <option value="18px">18px</option>
            <option value="20px">20px</option>
        </select>
        <span style="color: #475569;">|</span>
        <button class="float-btn" onclick="modifyTable('addRow')" title="Adicionar Linha Abaixo">+ 📄</button>
        <button class="float-btn" onclick="modifyTable('addCol')" title="Adicionar Coluna à Direita">+ 🗂️</button>
        <button class="float-btn" onclick="styleCell('clear', null)" title="Limpar Estilos"
            style="color: #ef4444;">🚫</button>
    </div>

    <div id="measure-container" class="page-content"></div>

    <script>
        const A4_HEIGHT_PX = 1123;
        const PADDING_TOP = 140;
        const PADDING_BOTTOM = 120;
        const MAX_CONTENT_HEIGHT = A4_HEIGHT_PX - (PADDING_TOP + PADDING_BOTTOM);

        const mdInput = document.getElementById('md-input');
        const measureContainer = document.getElementById('measure-container');
        const pagesContainer = document.getElementById('a4-pages-container');

        let globalHeader = "<div><b>Crie aqui um</b> Cabeçalho</div>";
        let globalFooter = "<div>Rodapé</div>";

        // --- SISTEMA DE UNDO / REDO ---
        const historyStack = [];
        let historyIndex = -1;
        const MAX_HISTORY = 30;
        let saveTimeout = null;

        function saveState(immediate = false) {
            const state = { md: getRawMarkdown(), header: globalHeader, footer: globalFooter };
            if (historyIndex >= 0 && historyStack[historyIndex].md === state.md && historyStack[historyIndex].header === state.header && historyStack[historyIndex].footer === state.footer) return;

            const executeSave = () => {
                if (historyIndex < historyStack.length - 1) historyStack.splice(historyIndex + 1);
                historyStack.push(state);
                if (historyStack.length > MAX_HISTORY) historyStack.shift();
                historyIndex = historyStack.length - 1;
                updateHistoryButtons();
            };
            if (immediate) { clearTimeout(saveTimeout); executeSave(); }
            else { clearTimeout(saveTimeout); saveTimeout = setTimeout(executeSave, 600); }
        }

        function undo() { if (historyIndex > 0) { historyIndex--; restoreState(historyStack[historyIndex]); } }
        function redo() { if (historyIndex < historyStack.length - 1) { historyIndex++; restoreState(historyStack[historyIndex]); } }

        function restoreState(state) {
            globalHeader = state.header; globalFooter = state.footer;
            mdInput.innerHTML = formatMarkdownToEditor(state.md);
            updatePages(false); updateHistoryButtons();
        }

        function updateHistoryButtons() {
            document.getElementById('btn-undo').disabled = historyIndex <= 0;
            document.getElementById('btn-redo').disabled = historyIndex >= historyStack.length - 1;
        }

        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') { e.preventDefault(); undo(); }
                if (e.key === 'y') { e.preventDefault(); redo(); }
            }
        });

        // --- COFRE DE IMAGENS E TURNDOWN ---
        const imageVault = new Map();
        const turndownService = new window.TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced' });
        turndownService.use(window.turndownPluginGfm.gfm);

        turndownService.addRule('styled-tables', {
            filter: function (node) { return node.nodeName === 'TABLE' && (node.hasAttribute('style') || node.querySelector('[style]')); },
            replacement: function (content, node) {
                const clone = node.cloneNode(true);
                clone.querySelectorAll('.active-cell').forEach(el => el.classList.remove('active-cell'));
                return '\n\n' + clone.outerHTML + '\n\n';
            }
        });

        // CORREÇÃO: Ensina o Turndown a salvar nossa quebra de página perfeitamente no Markdown!
        turndownService.addRule('page-breaks', {
            filter: function (node) {
                return node.nodeName === 'HR' && node.classList.contains('manual-page-break');
            },
            replacement: function (content, node) {
                return '\n\n<hr class="manual-page-break" contenteditable="false">\n\n';
            }
        });

        turndownService.addRule('smart-images', {
            filter: 'img',
            replacement: function (content, node) {
                let src = node.getAttribute('src') || '';
                const alt = node.alt || 'Imagem';
                if (src.startsWith('data:image')) {
                    let id = null;
                    for (let [key, val] of imageVault.entries()) { if (val === src) { id = key; break; } }
                    if (!id) { id = 'img_' + Date.now().toString(36); imageVault.set(id, src); }
                    src = `vault:${id}`;
                }
                const width = node.style.width; const align = node.getAttribute('align');
                if ((width && width !== '100%') || align) {
                    const wAttr = width ? ` style="width: ${width};"` : '';
                    const aAttr = align ? ` align="${align}"` : '';
                    return `<img src="${src}" alt="${alt}"${wAttr}${aAttr}>`;
                }
                return `![${alt}](${src})`;
            }
        });

        let isSyncing = false;

        function syncAfterEdit() {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const node = selection.anchorNode;
                if (node) {
                    const header = node.nodeType === 3 ? node.parentNode.closest('.header-content') : (node.closest ? node.closest('.header-content') : null);
                    const footer = node.nodeType === 3 ? node.parentNode.closest('.footer-content') : (node.closest ? node.closest('.footer-content') : null);

                    if (header) {
                        globalHeader = header.innerHTML;
                        document.querySelectorAll('.header-content').forEach(el => { if (el !== header) el.innerHTML = globalHeader; });
                        saveState(true); return;
                    }
                    if (footer) {
                        globalFooter = footer.innerHTML;
                        document.querySelectorAll('.footer-content').forEach(el => { if (el !== footer) el.innerHTML = globalFooter; });
                        saveState(true); return;
                    }
                }
            }
            syncVisualToMarkdown();
            saveState(true);
        }

        // CORREÇÃO: Insere o <hr> invisível e um <br> pra descer o cursor
        function insertPageBreak() {
            document.execCommand('insertHTML', false, '<hr class="manual-page-break" contenteditable="false"><p><br></p>');
            syncAfterEdit();
            updatePages(true);
        }

        function formatText(command, value = null) { document.execCommand(command, false, value); syncAfterEdit(); }
        function formatBlock(tag) { document.execCommand('formatBlock', false, tag); syncAfterEdit(); }
        function insertCustomHTML(htmlString) { document.execCommand('insertHTML', false, htmlString + '<p><br></p>'); syncAfterEdit(); }
        function insertLink() { const url = prompt("URL do link:"); if (url) formatText('createLink', url); }
        function insertImageURL() { const url = prompt("URL da imagem:"); if (url) { formatText('insertImage', url); setTimeout(() => updatePages(true), 100); saveState(true); } }
        function uploadImage(inputElem) {
            const file = inputElem.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) { formatText('insertImage', e.target.result); inputElem.value = ''; setTimeout(() => updatePages(true), 100); saveState(true); };
            reader.readAsDataURL(file);
        }

        // --- CÓPIA E BASE64 LIMPO ---
        mdInput.addEventListener('paste', function (e) {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
            saveState();
        });

        mdInput.addEventListener('copy', function (e) {
            const selection = window.getSelection();
            if (selection.isCollapsed) return;
            e.preventDefault();

            const tempDiv = document.createElement('div');
            tempDiv.appendChild(selection.getRangeAt(0).cloneContents());
            tempDiv.querySelectorAll('.b64-pill').forEach(pill => { pill.parentNode.replaceChild(document.createTextNode(pill.getAttribute('data-base64')), pill); });

            let html = tempDiv.innerHTML;
            html = html.replace(/<div><br><\/div>/gi, '\n').replace(/<div[^>]*>/gi, '\n').replace(/<\/div>/gi, '').replace(/<br\s*\/?>/gi, '\n').replace(/&nbsp;/gi, ' ');
            const txt = document.createElement('textarea'); txt.innerHTML = html;
            e.clipboardData.setData('text/plain', txt.value);
        });

        function copyMarkdown() { navigator.clipboard.writeText(getRawMarkdown()); alert('Markdown RAW copiado com sucesso!'); }

        // --- INTERAÇÕES DE TABELA E IMAGEM ---
        function insertTable() {
            const tableHTML = `<table style="width: 100%;"><tbody><tr><th>Cabeçalho 1</th><th>Cabeçalho 2</th></tr><tr><td>Dado 1</td><td>Dado 2</td></tr></tbody></table>`;
            insertCustomHTML(tableHTML);
        }

        let activeCell = null, activeImage = null;
        const tableTooltip = document.getElementById('table-tooltip');
        const imgTooltip = document.getElementById('img-tooltip');

        pagesContainer.addEventListener('click', (e) => {
            const cell = e.target.closest('td, th');
            if (cell) {
                if (activeImage) closeImageMenu();
                if (activeCell) activeCell.classList.remove('active-cell');
                activeCell = cell; activeCell.classList.add('active-cell');
                const rect = activeCell.getBoundingClientRect();
                tableTooltip.classList.remove('hidden'); tableTooltip.style.top = (rect.top - 50) + 'px'; tableTooltip.style.left = rect.left + 'px';
            } else if (e.target.tagName === 'IMG') {
                if (activeCell) closeTableMenu();
                if (activeImage) activeImage.classList.remove('active-img');
                activeImage = e.target; activeImage.classList.add('active-img');
                const rect = activeImage.getBoundingClientRect();
                imgTooltip.classList.remove('hidden'); imgTooltip.style.top = (rect.top - 50) + 'px'; imgTooltip.style.left = rect.left + 'px';
                const currentWidth = activeImage.style.width ? parseInt(activeImage.style.width) : 100;
                document.getElementById('resizer-slider').value = currentWidth; document.getElementById('resizer-label').innerText = currentWidth + '%';
            } else if (!e.target.closest('.floating-tooltip')) {
                closeTableMenu(); closeImageMenu();
            }
        });

        function closeTableMenu() { tableTooltip.classList.add('hidden'); if (activeCell) activeCell.classList.remove('active-cell'); activeCell = null; }
        function closeImageMenu() { imgTooltip.classList.add('hidden'); if (activeImage) activeImage.classList.remove('active-img'); activeImage = null; }
        pagesContainer.addEventListener('scroll', () => { closeTableMenu(); closeImageMenu(); });

        function styleCell(property, value) {
            if (!activeCell) return;
            if (property === 'clear') activeCell.removeAttribute('style'); else activeCell.style[property] = value;
            syncAfterEdit();
        }

        function modifyTable(action) {
            if (!activeCell) return;
            const table = activeCell.closest('table'); const row = activeCell.closest('tr'); const cellIndex = Array.from(row.children).indexOf(activeCell);
            if (action === 'addRow') {
                const newRow = row.cloneNode(true); Array.from(newRow.children).forEach(c => { c.innerHTML = '<br>'; c.removeAttribute('style'); });
                row.parentNode.insertBefore(newRow, row.nextSibling);
            } else if (action === 'addCol') {
                Array.from(table.rows).forEach(tr => {
                    const newCell = tr.children[cellIndex].cloneNode(true); newCell.innerHTML = '<br>'; newCell.removeAttribute('style');
                    tr.insertBefore(newCell, tr.children[cellIndex].nextSibling);
                });
            }
            syncAfterEdit(); updatePages(false); closeTableMenu();
        }

        let isResizing = false, resizeDir = '', currentElement = null, startX, startY, startWidth, startHeight;
        pagesContainer.addEventListener('mousemove', function (e) {
            if (!isResizing && (e.target.tagName === 'TH' || e.target.tagName === 'TD')) {
                const rect = e.target.getBoundingClientRect();
                const rightEdge = e.clientX > rect.right - 8; const bottomEdge = e.clientY > rect.bottom - 8;
                if (rightEdge && bottomEdge) e.target.style.cursor = 'nwse-resize'; else if (rightEdge) e.target.style.cursor = 'col-resize'; else if (bottomEdge) e.target.style.cursor = 'row-resize'; else e.target.style.cursor = 'text';
            }
            if (isResizing && currentElement) {
                if (resizeDir === 'col' || resizeDir === 'both') currentElement.style.width = startWidth + (e.clientX - startX) + 'px';
                if (resizeDir === 'row' || resizeDir === 'both') currentElement.style.height = startHeight + (e.clientY - startY) + 'px';
            }
        });
        pagesContainer.addEventListener('mousedown', function (e) {
            const cell = e.target.closest('td, th');
            if (cell) {
                const rect = cell.getBoundingClientRect(); const rightEdge = e.clientX > rect.right - 8; const bottomEdge = e.clientY > rect.bottom - 8;
                if (rightEdge || bottomEdge) {
                    isResizing = true; currentElement = cell; startX = e.clientX; startY = e.clientY; startWidth = currentElement.offsetWidth; startHeight = currentElement.offsetHeight;
                    if (rightEdge && bottomEdge) resizeDir = 'both'; else if (rightEdge) resizeDir = 'col'; else if (bottomEdge) resizeDir = 'row';
                    e.preventDefault();
                }
            }
        });
        window.addEventListener('mouseup', function (e) {
            if (isResizing) { isResizing = false; currentElement = null; syncAfterEdit(); updatePages(false); }
        });

        const slider = document.getElementById('resizer-slider');
        slider.addEventListener('input', (e) => { if (activeImage) { activeImage.style.width = e.target.value + '%'; document.getElementById('resizer-label').innerText = e.target.value + '%'; } });
        slider.addEventListener('change', (e) => { if (activeImage) { syncAfterEdit(); updatePages(true); closeImageMenu(); } });

        function alignImage(position) {
            if (!activeImage) return;
            if (position === 'left' || position === 'right') activeImage.setAttribute('align', position); else activeImage.removeAttribute('align');
            syncAfterEdit(); updatePages(true); closeImageMenu();
        }

        // --- CORE SINCRONIZAÇÃO E PAGINAÇÃO ---
        function getOuterHeight(el) {
            if (el.nodeType !== Node.ELEMENT_NODE) return 24;
            const style = window.getComputedStyle(el);
            return el.offsetHeight + (parseFloat(style.marginTop) || 0) + (parseFloat(style.marginBottom) || 0);
        }

        function getRawMarkdown() {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = mdInput.innerHTML;
            tempDiv.querySelectorAll('.b64-pill').forEach(pill => { pill.parentNode.replaceChild(document.createTextNode(pill.getAttribute('data-base64')), pill); });
            let html = tempDiv.innerHTML;
            html = html.replace(/<div><br><\/div>/gi, '\n').replace(/<div[^>]*>/gi, '\n').replace(/<\/div>/gi, '').replace(/<br\s*\/?>/gi, '\n').replace(/&nbsp;/gi, ' ');
            const txt = document.createElement('textarea'); txt.innerHTML = html;
            return txt.value;
        }

        function formatMarkdownToEditor(md) {
            md = md.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            md = md.replace(/(data:image\/[^;]+;base64,)([a-zA-Z0-9+/=]+)/g, function (match) {
                return `<span class="b64-pill" contenteditable="false" data-base64="${match}" title="Copie o texto para obter o Base64 completo">Base64</span>`;
            });
            return md.replace(/\n/g, '<br>');
        }

        function syncVisualToMarkdown() {
            if (isSyncing) return;
            isSyncing = true;
            const allContentDivs = document.querySelectorAll('.page-content:not(#measure-container)');
            let fullHtml = '';
            allContentDivs.forEach(div => { fullHtml += div.innerHTML + '<br>'; });

            let md = turndownService.turndown(fullHtml);
            mdInput.innerHTML = formatMarkdownToEditor(md);
            isSyncing = false;
        }

        function updatePages(focusLastPage = false) {
            if (isSyncing) return;
            isSyncing = true;

            let rawMarkdown = getRawMarkdown();
            let rawHtml = marked.parse(rawMarkdown);

            rawHtml = rawHtml.replace(/src="vault:([^"]+)"/g, (match, id) => {
                return 'src="' + (imageVault.get(id) || '') + '"';
            });

            measureContainer.innerHTML = rawHtml;
            const pages = [];
            let currentPageContent = [];
            let currentHeight = 0;

            const childNodes = Array.from(measureContainer.childNodes);

            childNodes.forEach(node => {
                if (node.nodeType === Node.TEXT_NODE && node.textContent.trim() === '') return;

                // CORREÇÃO MESTRA: O Raio-X Infalível para procurar a Quebra de Página
                let isManualBreak = false;
                if (node.nodeName === 'HR' && node.classList.contains('manual-page-break')) {
                    isManualBreak = true;
                } else if (node.nodeType === Node.ELEMENT_NODE && node.querySelector('hr.manual-page-break')) {
                    isManualBreak = true;
                }

                if (isManualBreak) {
                    if (currentPageContent.length > 0) {
                        pages.push(currentPageContent.join(''));
                    }
                    currentPageContent = [];
                    currentHeight = 0;
                    
                    // RE-INJETA A QUEBRA NO TOPO DA PÁGINA SEGUINTE PARA NÃO SUMIR DO CÓDIGO
                    currentPageContent.push('<hr class="manual-page-break" contenteditable="false">');
                    return; // Pula o elemento invisível, forçando a página nova sem dar over-height
                }

                const nodeHeight = getOuterHeight(node);

                if (currentHeight + nodeHeight > MAX_CONTENT_HEIGHT && currentPageContent.length > 0) {
                    pages.push(currentPageContent.join(''));
                    currentPageContent = [];
                    currentHeight = 0;
                }

                currentPageContent.push(node.nodeType === Node.TEXT_NODE ? node.textContent : node.outerHTML);
                currentHeight += nodeHeight;
            });

            if (currentPageContent.length > 0) {
                pages.push(currentPageContent.join(''));
            }

            if (pages.length === 0) pages.push('<p><br></p>');
            renderA4Pages(pages, focusLastPage);
            isSyncing = false;
        }

        function renderA4Pages(pagesArray, focusLastPage) {
            pagesContainer.innerHTML = '';
            if (pagesArray.length === 0) pagesArray = ['<p><br></p>'];

            pagesArray.forEach((htmlContent, index) => {
                const pageNumber = index + 1;
                const totalPages = pagesArray.length;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'a4-page';

                pageDiv.innerHTML = `
                    <div class="page-header">
                        <div class="header-content" contenteditable="true" data-type="header">${globalHeader}</div>
                    </div>
                    
                    <div class="page-content" contenteditable="true">${htmlContent}</div>
                    
                    <div class="page-footer">
                        <div class="footer-content" contenteditable="true" data-type="footer">${globalFooter}</div>
                    </div>
                    <span class="page-number-display">Página ${pageNumber} de ${totalPages}</span>
                `;
                pagesContainer.appendChild(pageDiv);
            });

            if (focusLastPage) {
                const allPages = document.querySelectorAll('.page-content:not(#measure-container)');
                if (allPages.length > 0) {
                    const lastPage = allPages[allPages.length - 1];
                    lastPage.focus();
                    try {
                        const range = document.createRange();
                        range.selectNodeContents(lastPage);
                        range.collapse(false);
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                    } catch (e) { }
                    pagesContainer.scrollTop = pagesContainer.scrollHeight;
                }
            }
        }

        // --- LISTENERS INTELIGENTES ---
        mdInput.addEventListener('input', () => { updatePages(false); saveState(); });

        pagesContainer.addEventListener('input', function (e) {
            if (e.target && e.target.classList.contains('page-content')) {
                syncVisualToMarkdown(); saveState();
                if (e.target.scrollHeight > MAX_CONTENT_HEIGHT) updatePages(true);
            }
            else if (e.target && (e.target.classList.contains('header-content') || e.target.classList.contains('footer-content'))) {
                const type = e.target.getAttribute('data-type');
                const newValue = e.target.innerHTML;

                if (type === 'header') globalHeader = newValue;
                if (type === 'footer') globalFooter = newValue;

                document.querySelectorAll(`.${type}-content`).forEach(el => {
                    if (el !== e.target) el.innerHTML = newValue;
                });
                saveState();
            }
        });

        let isSplit = true;
        document.getElementById('toggle-view').addEventListener('click', (e) => {
            isSplit = !isSplit;
            document.getElementById('editor-pane').classList.toggle('hidden', !isSplit);
            e.target.innerText = isSplit ? 'Modo Foco Visual' : 'Mostrar Código MD';
        });

        // --- INICIALIZAÇÃO ---
        const introText = `# Bem-vindo ao Editor A4 Pro 📝

Este é um ambiente híbrido que une a velocidade do **Markdown** com o visual de um processador de textos profissional.

## 🚀 Como usar seus novos superpoderes:

### 1. Paginação Perfeita e Cabeçalhos
Tudo o que você digita é formatado em folhas A4 reais. 
* **Cabeçalhos e Rodapés Globais:** Edite o topo ou o final desta página (onde está escrito "Crie aqui um Cabeçalho") e a alteração será aplicada em todas as folhas.
* **Quebra de Página:** Precisa iniciar um novo capítulo? Clique em **📄 Quebra** na barra superior. O texto será empurrado para a próxima folha de forma invisível.

### 2. Imagens com Alinhamento Mágico
Faça upload de uma imagem do seu computador usando o botão **📁 Img (PC)**. 
* Clique na imagem para abrir o *Menu Flutuante*.
* Use a barra deslizante para **redimensionar** de 10% a 100%.
* Use os botões **[<] Float L** ou **Float R [>]** para jogar a imagem para o lado e fazer o texto abraçá-la!

### 3. Tabelas Interativas (Estilo Planilha)
Insira uma **📊 Tabela** e clique em qualquer célula dela. Um menu escuro aparecerá:
* Mude a cor de fundo (🪣) ou a cor/tamanho do texto de células individuais.
* Adicione novas linhas (📄) ou colunas (🗂️) com um clique.
* **Dica:** Passe o mouse sobre as bordas da tabela e arraste para redimensionar colunas e linhas livremente!

### 4. Nos Bastidores (O Cofre Base64)
Se você olhar o código-fonte (clicando em "Mostrar Código MD"), verá que as imagens enviadas não criam um texto gigante e ilegível. Elas são transformadas em links azuis e discretos. 
* Use o botão **📋 Copiar RAW MD** para exportar o código completo (com as imagens inclusas em Base64) para a sua área de transferência.
* Errou algo? Use **Ctrl+Z** para voltar no tempo.`;

        mdInput.innerHTML = formatMarkdownToEditor(introText);
        updatePages();
        saveState(true);
    </script>
</body>
